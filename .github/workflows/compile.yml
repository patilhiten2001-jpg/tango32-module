name: Build Tango32 Android Kernel Module

on:
  workflow_dispatch: # Isse aap button daba kar build start kar sakte hain

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Android NDK & Clang
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev libelf-dev git awk
        # Download Android NDK r26b supporting LLVM Clang
        wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "NDK_PATH=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

    - name: Download Android 14 Kernel Headers (v6.1)
      run: |
        # Android GKI 6.1 kernel headers fetch karna
        git clone --depth=1 https://android.googlesource.com/kernel/common -b android14-6.1 kernel-src

    - name: Configure and Prepare Kernel Headers
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd kernel-src
        
        # 1. Base Android GKI Configuration generate karna
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld gki_defconfig
        
        # 2. CRUCIAL: Missing headers (jaise asm-offsets.h) aur scripts ko build karna module compilation ke liye
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld modules_prepare

    - name: Compile Tango32 Module
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        
        # Kernel module compile karna fully prepared headers ke sath
        make -C kernel-src M=$GITHUB_WORKSPACE \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-android- \
          CC=clang \
          LD=ld.lld \
          CONFIG_TANGO32=m \
          modules

    - name: Upload Compiled Module (.ko)
      uses: actions/upload-artifact@v4
      with:
        name: tango32-android14-kernel6.1
        path: tango32.ko
