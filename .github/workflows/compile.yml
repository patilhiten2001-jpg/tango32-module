name: Build Tango32 Android Kernel Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Android NDK & Clang
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev libelf-dev git gawk
        wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "NDK_PATH=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

    - name: Download Android 14 Kernel Headers (v6.1)
      run: |
        git clone --depth=1 --single-branch https://android.googlesource.com/kernel/common -b android14-6.1 kernel-src

    - name: Configure and Prepare Kernel Headers
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd kernel-src
        
        # 1. Full Android Toolchain LLVM wrapper variables define kiye hain taaki 'nm failed' error na aaye
        MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld NM=llvm-nm OBJCOPY=llvm-objcopy"
        
        # 2. GKI Defconfig generate karna
        make $MAKE_ARGS gki_defconfig
        
        # 3. CRUCIAL: BTF debugging ko disable karna taaki resolve_btfids compile na ho aur time/crash bache
        ./scripts/config --disable CONFIG_DEBUG_INFO_BTF
        
        # 4. Kernel scripts aur modules prepare karna 2 CPU cores ke sath
        make -j2 $MAKE_ARGS scripts
        make -j2 $MAKE_ARGS modules_prepare

    - name: Compile Tango32 Module
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        MAKE_ARGS="ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld NM=llvm-nm OBJCOPY=llvm-objcopy"
        
        # Module compilation step with full toolchain variables
        make -j2 -C kernel-src M=$GITHUB_WORKSPACE \
          $MAKE_ARGS \
          CONFIG_TANGO32=m \
          modules

    - name: Upload Compiled Module (.ko)
      uses: actions/upload-artifact@v4
      with:
        name: tango32-android14-kernel6.1
        path: tango32.ko
