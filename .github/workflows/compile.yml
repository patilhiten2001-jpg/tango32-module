name: Build Tango32 Android Kernel Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Android NDK & Clang
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev libelf-dev git gawk
        wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "NDK_PATH=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV

    - name: Download Android 14 Kernel Headers (v6.1)
      run: |
        # --depth=1 aur --single-branch se faltu git history download nahi hogi, space/RAM bachegi
        git clone --depth=1 --single-branch https://android.googlesource.com/kernel/common -b android14-6.1 kernel-src

    - name: Configure and Prepare Kernel Headers
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd kernel-src
        
        # 1. GKI Defconfig generate karna
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld gki_defconfig
        
        # 2. -j2 use karke sirf 2 CPU cores allow kiye hain taaki RAM full na ho aur Error 143 na aaye
        make -j2 ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld scripts
        make -j2 ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- CC=clang LD=ld.lld modules_prepare

    - name: Compile Tango32 Module
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        
        # Module compilation step
        make -j2 -C kernel-src M=$GITHUB_WORKSPACE \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-android- \
          CC=clang \
          LD=ld.lld \
          CONFIG_TANGO32=m \
          modules

    - name: Upload Compiled Module (.ko)
      uses: actions/upload-artifact@v4
      with:
        name: tango32-android14-kernel6.1
        path: tango32.ko
