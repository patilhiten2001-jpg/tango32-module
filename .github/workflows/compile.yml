name: Build Tango32 Android Kernel Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Android NDK & Clang Symlinks
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison flex libssl-dev libelf-dev git gawk
        wget https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        
        # Tools path set karna
        TOOLCHAIN_BIN=$GITHUB_WORKSPACE/android-ndk-r26b/toolchains/llvm/prebuilt/linux-x86_64/bin
        echo "NDK_PATH=$GITHUB_WORKSPACE/android-ndk-r26b" >> $GITHUB_ENV
        
        # CRUCIAL FIX: Hardcoded tools ke liye symlinks banana taaki kernel scripts fail na ho
        ln -sf $TOOLCHAIN_BIN/llvm-nm $TOOLCHAIN_BIN/aarch64-linux-android-nm
        ln -sf $TOOLCHAIN_BIN/llvm-objcopy $TOOLCHAIN_BIN/aarch64-linux-android-objcopy
        ln -sf $TOOLCHAIN_BIN/llvm-objdump $TOOLCHAIN_BIN/aarch64-linux-android-objdump
        ln -sf $TOOLCHAIN_BIN/llvm-strip $TOOLCHAIN_BIN/aarch64-linux-android-strip

    - name: Download Android 14 Kernel Headers (v6.1)
      run: |
        git clone --depth=1 --single-branch https://android.googlesource.com/kernel/common -b android14-6.1 kernel-src

    - name: Configure and Prepare Kernel Headers
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        cd kernel-src
        
        # GKI Defconfig with full LLVM suite
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- LLVM=1 gki_defconfig
        
        # Disable BTF parsing to prevent extra resource compilation crashes
        ./scripts/config --disable CONFIG_DEBUG_INFO_BTF
        
        # Core scripts preparation
        make -j2 ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- LLVM=1 scripts
        make -j2 ARCH=arm64 CROSS_COMPILE=aarch64-linux-android- LLVM=1 modules_prepare

    - name: Compile Tango32 Module
      run: |
        export PATH=$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH
        
        # Final Module Compilation
        make -j2 -C kernel-src M=$GITHUB_WORKSPACE \
          ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-android- \
          LLVM=1 \
          CONFIG_TANGO32=m \
          modules

    - name: Upload Compiled Module (.ko)
      uses: actions/upload-artifact@v4
      with:
        name: tango32-android14-kernel6.1
        path: tango32.ko
